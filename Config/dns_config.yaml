# Clash Verge DNS Config
# Purpose: fix Telegram/OpenClaw media download failures when Fake-IP is enabled.
# Usage: enable `enable_dns_settings: true` in Clash Verge Rev, then restart Clash Verge.

enable: true
listen: :53
enhanced-mode: fake-ip
fake-ip-range: 198.18.0.1/16
fake-ip-filter-mode: blacklist
prefer-h3: false
respect-rules: false
use-hosts: false
use-system-hosts: false
fake-ip-filter:
- '*.lan'
- '*.local'
- '*.arpa'
- time.*.com
- ntp.*.com
- time.*.com
- +.market.xiaomi.com
- localhost.ptlogin2.qq.com
- '*.msftncsi.com'
- www.msftconnecttest.com
- telegram.org
- '*.telegram.org'
- t.me
- '*.t.me'
- telegram-cdn.org
- '*.telegram-cdn.org'
default-nameserver:
- system
- 223.6.6.6
- 8.8.8.8
nameserver:
- 8.8.8.8
- https://doh.pub/dns-query
- https://dns.alidns.com/dns-query
fallback: []
nameserver-policy: {}
proxy-server-nameserver:
- https://doh.pub/dns-query
- https://dns.alidns.com/dns-query
- tls://223.5.5.5
direct-nameserver: []
direct-nameserver-follow-policy: false
fallback-filter:
  geoip: true
  geoip-code: CN
  ipcidr:
  - 240.0.0.0/4
  - 0.0.0.0/32
  domain:
  - +.google.com
  - +.facebook.com
  - +.youtube.com
